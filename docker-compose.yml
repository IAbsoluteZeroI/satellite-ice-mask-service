name: ${COMPOSE_PROJECT_NAME}

x-common-env: &common-env
  MINIO_ENDPOINT: ${MINIO_ENDPOINT}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET}
  POSTGRES_HOST: ${POSTGRES_HOST}
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

x-spark-env: &spark-env
  <<: *common-env
  SPARK_NO_DAEMONIZE: ${SPARK_NO_DAEMONIZE}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
  KAFKA_TOPIC: ${KAFKA_TOPIC}
  KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP}
  RAW_PREFIX: ${RAW_PREFIX}
  PROCESSED_PREFIX: ${PROCESSED_PREFIX}
  TILE_PREFIX: ${TILE_PREFIX}
  MASK_PREFIX: ${MASK_PREFIX}
  SHAPEFILE_PREFIX: ${SHAPEFILE_PREFIX}
  STATUS_PREFIX: ${STATUS_PREFIX}
  LOCAL_INPUT_DIR: ${SPARK_LOCAL_INPUT_DIR}
  WORK_DIR: ${WORK_DIR}
  MODEL_PATH: ${MODEL_PATH}
  LAND_MASK_PATH: ${LAND_MASK_PATH}
  SEGMENTATION_DEVICE: ${SEGMENTATION_DEVICE}
  NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
  NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}
  PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF}
  POLL_INTERVAL: ${POLL_INTERVAL}
  PROCESSOR_WORKERS: ${PROCESSOR_WORKERS}
  TILE_SIZE: ${TILE_SIZE}
  TILE_MIN_VALID_RATIO: ${TILE_MIN_VALID_RATIO}
  SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY}
  SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY}
  SPARK_EXECUTOR_CORES: ${SPARK_EXECUTOR_CORES}
  MASK_FILLED_THRESHOLD: ${MASK_FILLED_THRESHOLD}
  MASK_MIN_AREA: ${MASK_MIN_AREA}
  MASK_MERGE_GAPS: ${MASK_MERGE_GAPS}
  MASK_GAP_BUFFER: ${MASK_GAP_BUFFER}

x-spark-base: &spark-base
  build: ./services/spark
  stdin_open: true
  tty: true
  volumes:
    - ${HOST_DATA_DIR}:${SPARK_LOCAL_INPUT_DIR}
    - ${HOST_LAND_MASK_DIR}:${LAND_MASK_CONTAINER_DIR}
    - ${HOST_SPARK_APP_DIR}:${SPARK_APP_DIR}
    - ${HOST_SPARK_MODELS_DIR}:${SPARK_MODELS_DIR}
  environment:
    <<: *spark-env

services:
  postgres:
    container_name: satellite-postgres
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${HOST_POSTGRES_INIT_DIR}:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  minio:
    container_name: satellite-minio
    image: ${MINIO_IMAGE}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_API_PORT}:${MINIO_API_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_API_PORT}/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  zookeeper:
    container_name: satellite-zookeeper
    image: ${ZOOKEEPER_IMAGE}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    ports:
      - "${ZOOKEEPER_CLIENT_PORT}:${ZOOKEEPER_CLIENT_PORT}"

  kafka:
    container_name: satellite-kafka
    image: ${KAFKA_IMAGE}
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT}:9092"
      - "${KAFKA_EXTERNAL_PORT}:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  producer:
    container_name: satellite-producer
    build: ./services/producer
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      LOCAL_INPUT_DIR: ${PRODUCER_LOCAL_INPUT_DIR}
      CHECK_INTERVAL: ${CHECK_INTERVAL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      RAW_PREFIX: ${RAW_PREFIX}
      REMOVE_AFTER_UPLOAD: ${REMOVE_AFTER_UPLOAD}
    volumes:
      - ${HOST_DATA_DIR}:${PRODUCER_LOCAL_INPUT_DIR}
    restart: unless-stopped

  web:
    container_name: satellite-web
    build: ./services/web
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      TILE_PREFIX: ${TILE_PREFIX}
      MASK_PREFIX: ${MASK_PREFIX}
      SHAPEFILE_PREFIX: ${SHAPEFILE_PREFIX}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_PRESIGNED_TTL_SECONDS: ${MINIO_PRESIGNED_TTL_SECONDS}
      TILE_RENDER_PADDING_RATIO: ${TILE_RENDER_PADDING_RATIO}
      HTTP_CACHE_SECONDS: ${HTTP_CACHE_SECONDS}
      MASK_ALPHA_MULTIPLIER: ${MASK_ALPHA_MULTIPLIER}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY}
      DOWNLOAD_DIR: ${DOWNLOAD_DIR}
      EE_PROJECT: ${EE_PROJECT}
    ports:
      - "${WEB_HOST_PORT}:${WEB_CONTAINER_PORT}"
    volumes:
      - ${HOST_DATA_DIR}:${DOWNLOAD_DIR}
      - ${HOST_WEB_APP_DIR}:${WEB_APP_DIR}
    command: ["sh", "-c", "uvicorn main:app --host 0.0.0.0 --port ${WEB_CONTAINER_PORT} --workers $${WEB_CONCURRENCY:-2}"]
    restart: unless-stopped

  spark-master:
    <<: *spark-base
    container_name: spark-master
    environment:
      <<: *common-env
      SPARK_MODE: master
      SPARK_MASTER_HOST: ${SPARK_MASTER_HOST}
      SPARK_NO_DAEMONIZE: ${SPARK_NO_DAEMONIZE}
    ports:
      - "${SPARK_MASTER_PORT}:${SPARK_MASTER_PORT}"
      - "${SPARK_MASTER_UI_PORT}:${SPARK_MASTER_UI_INTERNAL_PORT}"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host ${SPARK_MASTER_HOST}
      --port ${SPARK_MASTER_PORT}
      --webui-port ${SPARK_MASTER_UI_INTERNAL_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SPARK_MASTER_UI_INTERNAL_PORT}"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  spark-worker-1:
    <<: *spark-base
    container_name: spark-worker-1
    gpus: ${SPARK_GPUS}
    shm_size: ${SPARK_SHM_SIZE}
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *spark-env
      SPARK_MODE: worker
      SPARK_MASTER: ${SPARK_MASTER_URL}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_DAEMON_MEMORY: ${SPARK_DAEMON_MEMORY}
    ports:
      - "${SPARK_WORKER_1_UI_PORT}:${SPARK_WORKER_UI_INTERNAL_PORT}"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      ${SPARK_MASTER_URL}

  spark-worker-2:
    <<: *spark-base
    container_name: spark-worker-2
    gpus: ${SPARK_GPUS}
    shm_size: ${SPARK_SHM_SIZE}
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *spark-env
      SPARK_MODE: worker
      SPARK_MASTER: ${SPARK_MASTER_URL}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_DAEMON_MEMORY: ${SPARK_DAEMON_MEMORY}
    ports:
      - "${SPARK_WORKER_2_UI_PORT}:${SPARK_WORKER_UI_INTERNAL_PORT}"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      ${SPARK_MASTER_URL}

  spark-worker-3:
    <<: *spark-base
    container_name: spark-worker-3
    gpus: ${SPARK_GPUS}
    shm_size: ${SPARK_SHM_SIZE}
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      <<: *spark-env
      SPARK_MODE: worker
      SPARK_MASTER: ${SPARK_MASTER_URL}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_DAEMON_MEMORY: ${SPARK_DAEMON_MEMORY}
    ports:
      - "${SPARK_WORKER_3_UI_PORT}:${SPARK_WORKER_UI_INTERNAL_PORT}"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      ${SPARK_MASTER_URL}

  spark-processor:
    <<: *spark-base
    container_name: spark-processor
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      /opt/spark/bin/spark-submit
      --master ${SPARK_MASTER_URL}
      --deploy-mode client
      --conf spark.driver.memory=${SPARK_DRIVER_MEMORY}
      --conf spark.executor.memory=${SPARK_EXECUTOR_MEMORY}
      --conf spark.executor.memoryOverhead=${SPARK_EXECUTOR_MEMORY_OVERHEAD}
      --conf spark.executor.cores=${SPARK_EXECUTOR_CORES}
      --conf spark.task.cpus=${SPARK_TASK_CPUS}
      --conf spark.python.worker.reuse=true
      --conf spark.default.parallelism=${SPARK_DEFAULT_PARALLELISM}
      ${SPARK_APP_DIR}/main.py
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
