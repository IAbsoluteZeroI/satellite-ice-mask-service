<!DOCTYPE html>
<html>
<head>
    <title>Загрузка TIFF</title>
</head>
<body>
    <h2>Загрузите TIFF-файл</h2>
    <form action="/upload/" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".tiff,.tif" required>
        <button type="submit">Загрузить</button>
    </form>
</body>
</html>
